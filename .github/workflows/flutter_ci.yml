name: Flutter CI — Build & Publish APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'          # trigger on semver tags, e.g. v1.2.3
  pull_request:
    branches: [main, master]

# ──────────────────────────────────────────────────────────────────────────────
# Concurrency: cancel any in-progress run on the same branch/PR
# ──────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Job 1 – Analyze & Test
  # ============================================================================
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.x'   # pin to a stable channel; bump as needed
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: sample_app
        run: flutter pub get

      - name: Run code generator (build_runner)
        working-directory: sample_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        working-directory: sample_app
        run: dart format --output=none --set-exit-if-changed .

      - name: Run analysis
        working-directory: sample_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: sample_app
        run: flutter test --coverage

  # ============================================================================
  # Job 2 – Build APK (debug on PR, release on push to main/tag)
  # ============================================================================
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: analyze           # only build if analysis passes

    env:
      FLUTTER_VERSION: '3.32.x'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Decode and restore the signing keystore ─────────────────────────────
      # Store these secrets in: Settings → Secrets and variables → Actions
      #   KEYSTORE_BASE64   : base64-encoded .jks file
      #   KEY_ALIAS         : key alias inside the keystore
      #   KEY_PASSWORD      : key password
      #   STORE_PASSWORD    : keystore password
      - name: Restore signing keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > sample_app/android/app/release.jks

      - name: Write key.properties
        if: github.event_name != 'pull_request'
        run: |
          cat > sample_app/android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      # ── Set up Flutter ──────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Set up Java 17 (required by Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: sample_app
        run: flutter pub get

      - name: Run code generator (build_runner)
        working-directory: sample_app
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Debug APK (PR only) ─────────────────────────────────────────────────
      - name: Build debug APK
        if: github.event_name == 'pull_request'
        working-directory: sample_app
        run: flutter build apk --debug

      - name: Upload debug APK artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: fooderlich-debug-${{ github.sha }}
          path: sample_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── Release APK (push to main / tag) ───────────────────────────────────
      - name: Build release APK
        if: github.event_name != 'pull_request'
        working-directory: sample_app
        run: |
          flutter build apk \
            --release \
            --build-name=${{ github.ref_name }} \
            --build-number=${{ github.run_number }}

      - name: Upload release APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: fooderlich-release-${{ github.sha }}
          path: sample_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ============================================================================
  # Job 3 – Publish a GitHub Release (only on semver tags)
  # ============================================================================
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write      # required to create a release

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: fooderlich-release-${{ github.sha }}
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fooderlich ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta → prerelease
          generate_release_notes: true
          files: artifacts/app-release.apk
